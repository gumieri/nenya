# Example configuration for Nenya AI Gateway
# See SECRETS_FORMAT.md for required API keys and tokens.
# Secrets are loaded via systemd credentials, not from this file.

[server]
listen_addr = ":8080"
max_body_bytes = 10485760 

[interceptor]
soft_limit = 4000           # characters (runes) – Tier 1 pass‑through
hard_limit = 24000          # characters (runes) – Tier 3 truncation threshold
truncation_strategy = "middle-out"
keep_first_percent = 15.0
keep_last_percent = 25.0

[ratelimit]
max_tpm = 250000            # tokens per minute (approximate)
max_rpm = 15                # requests per minute

[ollama]
url = "http://127.0.0.1:11434/api/generate"
model = "qwen2.5-coder:7b"
system_prompt = "You are a data privacy filter. Summarize the following log/code error in 5 lines. REMOVE any IP addresses, AWS keys (AKIA...), or passwords. Keep only the technical core of the error."
timeout_seconds = 600           # inference timeout — increase for slow hardware or large models

[filter]
# Tier‑0 regex‑based secret redaction (runs on every request)
enabled = true
redaction_label = "[REDACTED]"
# Patterns are Go regexps, compiled at startup.
# Default patterns cover AWS keys, GitHub tokens, Google OAuth, private keys, etc.
# patterns = [
#   "(?i)AKIA[0-9A-Z]{16}",
#   "(?i)gh(p|o|s)_[a-zA-Z0-9]{36,255}",
#   "(?i)ya29\\.[0-9A-Za-z\\-_]+",
#   "(?i)sk-[a-zA-Z0-9]{48}",
#   "(?i)-----BEGIN (RSA|DSA|EC|PRIVATE) KEY-----",
#   "(?i)(aws_access_key_id|aws_secret_access_key)\\s*=\\s*['\"][^'\"]{10,}['\"]",
#   "(?i)(password|passwd|pwd|secret|token|key)[\\s:=]+['\"][^'\"]{6,}['\"]",
#   "(?i)\\b[0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}\\b",
#   "(?i)[a-f0-9]{32}:",
#   "(?i)SG\\.[a-zA-Z0-9\\-_]{22}\\.[a-zA-Z0-9\\-_]{43}",
# ]

# Provider Registry
# Built-in providers are pre-configured (gemini, deepseek, zai, groq, together, ollama).
# Add or override providers here. The `route_prefixes` field determines which model
# names are routed to this provider. The `auth_style` field controls how API keys
# are injected: "bearer" (Authorization header), "bearer+x-goog" (adds x-goog-api-key),
# or "none" (no key needed, e.g. local Ollama).
#
# [providers.openai]
# url = "https://api.openai.com/v1/chat/completions"
# route_prefixes = ["gpt-", "o3-", "o4-"]
# auth_style = "bearer"
#
# To override a built-in provider's URL:
# [providers.gemini]
# url = "https://your-custom-gemini-proxy.example.com/v1/chat/completions"

# Agents — named profiles with ordered fallback chains.
# When an AI tool sends model="plan", the gateway tries each entry in sequence.
# On 429 (rate limited) or 5xx (server error) the model is put in cooldown and
# the next entry is tried. Cooldown duration is configurable per agent.
#
# Providers: gemini | deepseek | zai | groq | together | ollama
# Each entry can also set url = "..." to override the provider's default endpoint.

# strategy:
#   "round-robin" (default) — rotates the starting model each request to spread load.
#   "fallback"              — always starts from the first model; advances only on failure.
#
# cooldown_seconds: how long a failed model (429/5xx) is skipped before retrying. Default 60.
#
# max_context: per-model token limit. If the request exceeds it the model is skipped
#              entirely (no cooldown set — it's a size constraint, not a failure).
#              0 means no limit.

