[tools]

[tasks.build]
description = "Build the nenya binary"
run = "go build -o nenya ./cmd/nenya"

[tasks.test]
description = "Run all tests"
run = "go test ./..."

[tasks.vet]
description = "Run go vet"
run = "go vet ./..."

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run"

[tasks.clean]
description = "Remove built binary"
run = "rm -f nenya"

[tasks.run]
description = "Build and run locally with dummy credentials"
depends = ["build"]
run = """
mkdir -p creds
if [ ! -f creds/secrets ]; then
  echo "WARNING: Creating dummy secrets file for local testing. Replace with real API keys!"
  printf '{\n  "client_token": "test-client-token",\n  "provider_keys": {\n    "gemini": "dummy-gemini-key",\n    "deepseek": "dummy-deepseek-key",\n    "zai": "dummy-zai-key"\n  }\n}\n' > creds/secrets
fi
CREDENTIALS_DIRECTORY=./creds ./nenya -config config.json
"""

[tasks.release]
description = "Cross-compile for all platforms"
run = """
CGO_ENABLED=0 GOOS=linux  GOARCH=amd64 go build -o nenya-linux-amd64 ./cmd/nenya
CGO_ENABLED=0 GOOS=linux  GOARCH=arm64 go build -o nenya-linux-arm64 ./cmd/nenya
CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -o nenya-darwin-amd64 ./cmd/nenya
CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -o nenya-darwin-arm64 ./cmd/nenya
"""

[tasks.mcp-build]
description = "Build MCP transport only"
run = "go build ./internal/mcp/"

[tasks.mcp-test]
description = "Run MCP package tests"
run = "go test -v -count=1 ./internal/mcp/"

[tasks.mcp-proxy-test]
description = "Run MCP proxy/tool execution tests"
run = "go test -v -count=1 ./internal/proxy/ -run 'MCP|Tool'"

[tasks.mcp-all]
description = "Run all MCP-related tests"
depends = ["mcp-build", "mcp-test", "mcp-proxy-test"]

[tasks.raw-build]
description = "Build binary using direct go path"
run = "go build -o nenya ./cmd/nenya"

[tasks.raw-test]
description = "Run all tests using direct go path"
run = "go test -count=1 ./..."

[tasks.raw-vet]
description = "Run go vet using direct go path"
run = "go vet ./..."