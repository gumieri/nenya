[tools]
go = "latest"

[tasks.build]
description = "Build the nenya binary"
run = "go build -o nenya ./cmd/nenya"

[tasks.test]
description = "Run all tests"
run = "go test ./..."

[tasks.vet]
description = "Run go vet"
run = "go vet ./..."

[tasks.lint]
description = "Format and vet source"
run = ["go fmt ./...", "go vet ./..."]

[tasks.clean]
description = "Remove built binary"
run = "rm -f nenya"

[tasks.install]
description = "Build and install binary, config, and systemd unit (prompts for sudo)"
depends = ["build"]
run = """
sudo install -Dm755 nenya /usr/local/bin/nenya
if [ ! -f /etc/nenya/config.json ]; then
	sudo install -Dm644 configs/example.config.json /etc/nenya/config.json
	echo "Installed example config to /etc/nenya/config.json"
else
	echo "Config /etc/nenya/config.json exists, skipping overwrite"
fi
sudo install -Dm644 deploy/nenya.service /etc/systemd/system/nenya.service
sudo systemctl daemon-reload
echo "Installed. Configure secrets as per docs/SECRETS_FORMAT.md and enable service:"
echo "  sudo systemctl enable --now nenya.service"
"""

[tasks.run]
description = "Build and run locally with dummy credentials"
depends = ["build"]
run = """
mkdir -p creds
if [ ! -f creds/secrets ]; then
  echo "WARNING: Creating dummy secrets file for local testing. Replace with real API keys!"
  printf '{\n  "client_token": "test-client-token",\n  "provider_keys": {\n    "gemini": "dummy-gemini-key",\n    "deepseek": "dummy-deepseek-key",\n    "zai": "dummy-zai-key"\n  }\n}\n' > creds/secrets
fi
	CREDENTIALS_DIRECTORY=./creds ./nenya -config config.json
"""

[tasks.release]
description = "Cross-compile for all platforms"
run = """
CGO_ENABLED=0 GOOS=linux  GOARCH=amd64 go build -o nenya-linux-amd64  ./cmd/nenya
CGO_ENABLED=0 GOOS=linux  GOARCH=arm64 go build -o nenya-linux-arm64  ./cmd/nenya
CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -o nenya-darwin-amd64 ./cmd/nenya
CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -o nenya-darwin-arm64  ./cmd/nenya
"""

[tasks.mcp-build]
description = "Build MCP transport only (quick compile check, bypasses rtk)"
run = "GOOS=$(go env GOOS) GOARCH=$(go env GOARCH) /home/rafael/.local/share/mise/installs/go/1.26.1/bin/go build ./internal/mcp/"

[tasks.mcp-test]
description = "Run MCP package tests (bypasses rtk)"
run = "/home/rafael/.local/share/mise/installs/go/1.26.1/bin/go test -v -count=1 ./internal/mcp/"

[tasks.mcp-proxy-test]
description = "Run MCP proxy/tool execution tests (bypasses rtk)"
run = "/home/rafael/.local/share/mise/installs/go/1.26.1/bin/go test -v -count=1 ./internal/proxy/ -run 'MCP|Tool'"

[tasks.mcp-all]
description = "Run all MCP-related tests (bypasses rtk)"
