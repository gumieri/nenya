name: Container

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: go-mod-${{ hashFiles('go.sum') }}

      - name: Pre-download Go modules
        run: go mod download

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push multi-arch images
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Containerfile
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}-amd64
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}-arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM for amd64
        uses: anchore/sbom-action@v1
        with:
          image: ghcr.io/${{ github.repository }}:${{ github.ref_name }}-amd64
          output-file: nenya-${{ github.ref_name }}-linux-amd64.spdx.json
          format: spdx-json

      - name: Generate SBOM for arm64
        uses: anchore/sbom-action@v1
        with:
          image: ghcr.io/${{ github.repository }}:${{ github.ref_name }}-arm64
          output-file: nenya-${{ github.ref_name }}-linux-arm64.spdx.json

      - name: Sign images
        run: |
          IMAGE="ghcr.io/${{ github.repository }}"
          VERSION="${{ github.ref_name }}"

          for arch in amd64 arm64; do
            DIGEST=$(docker buildx imagetools inspect \
              --format '{{.Manifest.Digest}}' \
              "${IMAGE}:${VERSION}-${arch}")
            cosign sign --yes "ghcr.io/${{ github.repository }}@${DIGEST}"
          done

          MANIFEST_DIGEST=$(docker buildx imagetools inspect \
            --format '{{.Manifest.Digest}}' \
            "${IMAGE}:${VERSION}")
          cosign sign --yes "ghcr.io/${{ github.repository }}@${MANIFEST_DIGEST}"

      - name: Attest SBOM for each architecture
        run: |
          IMAGE="ghcr.io/${{ github.repository }}"
          VERSION="${{ github.ref_name }}"

          for arch in amd64 arm64; do
            DIGEST=$(docker buildx imagetools inspect \
              --format '{{.Manifest.Digest}}' \
              "${IMAGE}:${VERSION}-${arch}")
            cosign attest --predicate "nenya-${VERSION}-linux-${arch}.spdx.json" \
              --type spdx --yes \
              "ghcr.io/${{ github.repository }}@${DIGEST}"
          done
