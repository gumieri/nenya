name: Container

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.11.1

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for tags
        id: meta
        uses: docker/metadata-action@v5.7.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push container images
        id: build-and-push
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          file: deploy/Containerfile
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.meta.outputs.tags }}
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}-amd64
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}-arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign image with a key
        env:
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
          TAGS: ${{ steps.build-and-push.outputs.tags }}
        run: |
          echo "${TAGS}" | while read -r tag; do
            [ -z "$tag" ] && continue
            echo "Signing ${tag}@${DIGEST}"
            cosign sign --yes "${tag}@${DIGEST}"
          done

      - name: Generate SBOM for amd64
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository }}:${{ github.ref_name }}-amd64
          format: spdx-json
          output-file: nenya-${{ github.ref_name }}-linux-amd64.spdx.json

      - name: Generate SBOM for arm64
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository }}:${{ github.ref_name }}-arm64
          format: spdx-json
          output-file: nenya-${{ github.ref_name }}-linux-arm64.spdx.json

      - name: Validate SBOM JSON
        run: |
          set -e
          jq . nenya-${{ github.ref_name }}-linux-amd64.spdx.json > /dev/null
          jq . nenya-${{ github.ref_name }}-linux-arm64.spdx.json > /dev/null

      - name: Create release and upload SBOMs
        run: |
          VERSION="${{ github.ref_name }}"

          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Release ${VERSION} already exists, uploading assets..."
          else
            echo "Creating release ${VERSION}..."
            gh release create "$VERSION" \
              --verify-tag \
              --title "Nenya ${VERSION}" \
              --generate-notes
          fi

          gh release upload "$VERSION" \
            nenya-${VERSION}-linux-amd64.spdx.json \
            nenya-${VERSION}-linux-arm64.spdx.json \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest SBOM for each architecture
        run: |
          IMAGE="ghcr.io/${{ github.repository }}"
          VERSION="${{ github.ref_name }}"

          for arch in amd64 arm64; do
            DIGEST=$(docker buildx imagetools inspect \
              --format '{{.Manifest.Digest}}' \
              "${IMAGE}:${VERSION}-${arch}")
            cosign attest \
              --predicate "nenya-${VERSION}-linux-${arch}.spdx.json" \
              --yes \
              "ghcr.io/${{ github.repository }}@${DIGEST}"
          done