name: Container

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.11.1

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for tags
        id: meta
        uses: docker/metadata-action@v5.7.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push container images
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Containerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILDTIME=${{ github.event.created_at }}
          tags: |
            ${{ steps.meta.outputs.tags }}
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}-amd64
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}-arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign image with provenance
        env:
          IMAGE: ghcr.io/${{ github.repository }}
        run: |
          VERSION="${{ github.ref_name }}"

          for arch in amd64 arm64; do
            TAG="${IMAGE}:${VERSION}-${arch}"
            ARCH_DIGEST=$(docker buildx imagetools inspect \
              --format '{{.Manifest.Digest}}' \
              "${TAG}")
            echo "Signing ${TAG}@${ARCH_DIGEST}"
            cosign sign --yes "${TAG}@${ARCH_DIGEST}"
            echo "Attesting ${TAG}@${ARCH_DIGEST}"
            cosign attest \
              --yes \
              --type slsaprovenance \
              --predicate nenya-${VERSION}-linux-${arch}.spdx.json \
              "${TAG}@${ARCH_DIGEST}"
          done

      - name: Generate SBOM for amd64
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository }}:${{ github.ref_name }}-amd64
          format: spdx-json
          output-file: nenya-${{ github.ref_name }}-linux-amd64.spdx.json

      - name: Generate SBOM for arm64
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository }}:${{ github.ref_name }}-arm64
          format: spdx-json
          output-file: nenya-${{ github.ref_name }}-linux-arm64.spdx.json

      - name: Validate SBOM JSON
        run: |
          set -e
          jq . nenya-${{ github.ref_name }}-linux-amd64.spdx.json > /dev/null
          jq . nenya-${{ github.ref_name }}-linux-arm64.spdx.json > /dev/null

      - name: Create release and upload SBOMs
        run: |
          VERSION="${{ github.ref_name }}"

          # Wait up to 60s for goreleaser to create the release
          timeout=60
          while ! gh release view "$VERSION" >/dev/null 2>&1; do
            if [ $timeout -le 0 ]; then
              echo "Timeout: Release ${VERSION} not found"
              exit 1
            fi
            echo "Waiting for release ${VERSION} to be created..."
            sleep 5
            timeout=$((timeout - 5))
          done

          gh release upload "$VERSION" \
            nenya-${VERSION}-linux-amd64.spdx.json \
            nenya-${VERSION}-linux-arm64.spdx.json \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
