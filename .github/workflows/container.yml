name: Container

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: go-mod-${{ hashFiles('go.sum') }}

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - uses: docker/setup-qemu-action@v3

      - name: Pre-download Go modules
        run: go mod download

      - uses: anchore/sbom-action/download-syft@v0

      - name: Build multi-arch images
        run: |
          IMAGE="ghcr.io/${{ github.repository }}/nenya"
          VERSION="${{ github.ref_name }}"

          for arch in amd64 arm64; do
            podman build --platform linux/${arch} \
              -f deploy/Containerfile \
              -v ~/go/pkg/mod:/go/pkg/mod \
              -t "${IMAGE}:${VERSION}-${arch}" .
          done

      - name: Generate SBOM for each architecture
        run: |
          IMAGE="ghcr.io/${{ github.repository }}/nenya"
          VERSION="${{ github.ref_name }}"

          for arch in amd64 arm64; do
            syft "${IMAGE}:${VERSION}-${arch}" -o spdx-json > nenya-${VERSION}-linux-${arch}.spdx.json
          done

      - name: Create manifest and push
        run: |
          IMAGE="ghcr.io/${{ github.repository }}/nenya"
          VERSION="${{ github.ref_name }}"

          podman manifest create "${IMAGE}:${VERSION}"
          podman manifest add "${IMAGE}:${VERSION}" "${IMAGE}:${VERSION}-amd64"
          podman manifest add "${IMAGE}:${VERSION}" "${IMAGE}:${VERSION}-arm64"
          podman manifest push "${IMAGE}:${VERSION}"

          podman manifest create "${IMAGE}:latest"
          podman manifest add "${IMAGE}:latest" "${IMAGE}:${VERSION}-amd64"
          podman manifest add "${IMAGE}:latest" "${IMAGE}:${VERSION}-arm64"
          podman manifest push "${IMAGE}:latest"

      - name: Sign images
        run: |
          IMAGE="ghcr.io/${{ github.repository }}/nenya"
          VERSION="${{ github.ref_name }}"

          for arch in amd64 arm64; do
            DIGEST=$(podman inspect --format='{{.Digest}}' "${IMAGE}:${VERSION}-${arch}")
            cosign sign --yes "ghcr.io/${{ github.repository }}@${DIGEST}"
          done

          MANIFEST_DIGEST=$(podman manifest inspect --format='{{.ManifestDigest}}' "${IMAGE}:${VERSION}")
          cosign sign --yes "ghcr.io/${{ github.repository }}@${MANIFEST_DIGEST}"

      - name: Attest SBOM for each architecture
        run: |
          IMAGE="ghcr.io/${{ github.repository }}/nenya"
          VERSION="${{ github.ref_name }}"

          for arch in amd64 arm64; do
            DIGEST=$(podman inspect --format='{{.Digest}}' "${IMAGE}:${VERSION}-${arch}")
            cosign attest --predicate "nenya-${VERSION}-linux-${arch}.spdx.json" \
                          --type spdx --yes "ghcr.io/${{ github.repository }}@${DIGEST}"
          done

