name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build all platforms
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist

          platforms=(
            "linux   amd64  tar.gz"
            "linux   arm64  tar.gz"
            "darwin  amd64  tar.gz"
            "darwin  arm64  tar.gz"
          )

          for entry in "${platforms[@]}"; do
            read -r GOOS GOARCH EXT <<< "$entry"
            BINARY="nenya"

            echo "Building ${GOOS}/${GOARCH}..."
            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
              go build -ldflags="-s -w" -o "dist/${BINARY}" .

            ARCHIVE="nenya-${VERSION}-${GOOS}-${GOARCH}.${EXT}"
            echo "Packaging ${ARCHIVE}..."

            cp nenya.service dist/nenya.service
            cp example.config.json dist/config.json.example
            tar -czf "${ARCHIVE}" -C dist "${BINARY}" nenya.service config.json.example

            rm -f "dist/${BINARY}" dist/nenya.service dist/config.json.example
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          echo "Creating release ${VERSION}..."

          gh release create "$VERSION" \
            --title "Nenya ${VERSION}" \
            --generate-notes \
            nenya-${VERSION}-linux-amd64.tar.gz \
            nenya-${VERSION}-linux-arm64.tar.gz \
            nenya-${VERSION}-darwin-amd64.tar.gz \
            nenya-${VERSION}-darwin-arm64.tar.gz
