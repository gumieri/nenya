name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build all platforms
        run: |
          VERSION="${GITHUB_REF_NAME}"

          platforms=(
            "linux   amd64  tar.gz"
            "linux   arm64  tar.gz"
            "darwin  amd64  tar.gz"
            "darwin  arm64  tar.gz"
          )

          for entry in "${platforms[@]}"; do
            read -r GOOS GOARCH EXT <<< "$entry"
            BINARY="nenya"

            echo "Building ${GOOS}/${GOARCH}..."
            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
              go build -ldflags="-s -w" -o "nenya-${VERSION}-${GOOS}-${GOARCH}" ./cmd/nenya

            cp deploy/nenya.service "nenya-${VERSION}-${GOOS}-${GOARCH}.service"
            cp configs/example.config.json "nenya-${VERSION}-${GOOS}-${GOARCH}.config.json.example"
            tar -czf "nenya-${VERSION}-${GOOS}-${GOARCH}.tar.gz" \
              "nenya-${VERSION}-${GOOS}-${GOARCH}" \
              "nenya-${VERSION}-${GOOS}-${GOARCH}.service" \
              "nenya-${VERSION}-${GOOS}-${GOARCH}.config.json.example"

            rm -f "nenya-${VERSION}-${GOOS}-${GOARCH}" \
              "nenya-${VERSION}-${GOOS}-${GOARCH}.service" \
              "nenya-${VERSION}-${GOOS}-${GOARCH}.config.json.example"
          done

      - name: Generate checksums
        run: sha256sum nenya-*.tar.gz > checksums.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
           VERSION="${GITHUB_REF_NAME}"

           if gh release view "$VERSION" >/dev/null 2>&1; then
             echo "Release ${VERSION} already exists, updating..."
             gh release edit "$VERSION" --title "Nenya ${VERSION}" --verify-tag
             gh release upload "$VERSION" \
               nenya-${VERSION}-linux-amd64.tar.gz \
               nenya-${VERSION}-linux-arm64.tar.gz \
               nenya-${VERSION}-darwin-amd64.tar.gz \
               nenya-${VERSION}-darwin-arm64.tar.gz \
               checksums.txt \
               --clobber
             echo "Release ${VERSION} updated."
             exit 0
           fi

           echo "Creating release ${VERSION}..."
           gh release create "$VERSION" \
             --verify-tag \
             --title "Nenya ${VERSION}" \
             --generate-notes \
             nenya-${VERSION}-linux-amd64.tar.gz \
             nenya-${VERSION}-linux-arm64.tar.gz \
             nenya-${VERSION}-darwin-amd64.tar.gz \
             nenya-${VERSION}-darwin-arm64.tar.gz \
             checksums.txt
