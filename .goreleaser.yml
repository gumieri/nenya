version: 2
project_name: nenya
env:
  - GOFLAGS=-mod=readonly

before:
  hooks:
    - go test ./... -race -timeout 5m
    - go vet ./...

builds:
  - id: nenya
    builder: go
    binary: nenya
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X nenya/internal/version.Version={{.Version}}
      - -X nenya/internal/version.Commit={{.Commit}}
      - -X nenya/internal/version.BuildTime={{.Date}}
    main: ./cmd/nenya

archives:
  - builds: [nenya]
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}"
    files:
      - src: deploy/nenya.service
      - src: deploy/nenya.socket
      - src: configs/example.config.json

nfpms:
  - id: nenya
    package_name: nenya
    bindir: /usr/bin
    formats:
      - deb
      - rpm
      - archlinux
    contents:
      - src: deploy/nenya.service
        dst: /usr/lib/systemd/system/nenya.service
      - src: deploy/nenya.socket
        dst: /usr/lib/systemd/system/nenya.socket
      - src: configs/example.config.json
        dst: /etc/nenya/config.json.example
        type: config|noreplace
    dependencies:
      - systemd
    maintainer: Rafael Gumieri <rgumieri@gmail.com>
    description: |
      Nenya is a lightweight, highly secure AI API Gateway/Proxy written in Go.
      It acts as transparent middleware between local AI coding clients and
      upstream LLM providers (Anthropic, Gemini, DeepSeek, Mistral, xAI, and more),
      featuring context summarization via local Ollama, PII/secret redaction,
      dynamic routing with circuit breakers, agent fallback chains, and MCP tool integration.
      Built with zero external dependencies, seccomp hardening, and IPC_LOCK memory protection.
    homepage: https://github.com/gumieri/nenya
    license: MIT
    scripts:
      postinstall: packaging/scripts/postinstall.sh
      preremove: packaging/scripts/preremove.sh

aurs:
  - name: nenya-bin
    description: Nenya is a lightweight, highly secure AI API Gateway/Proxy written in Go. Transparent middleware between AI coding clients and upstream LLM providers.
    homepage: https://github.com/gumieri/nenya
    license: MIT
    depends:
      - systemd
    provides:
      - nenya
    conflicts:
      - nenya
    git_url: ssh://aur@aur.archlinux.org/nenya-bin.git
    private_key: "{{ .Env.AUR_KEY }}"
    package: |
      install -Dm755 "./nenya" "${pkgdir}/usr/bin/nenya"
      install -Dm644 "./nenya.service" "${pkgdir}/usr/lib/systemd/system/nenya.service"
      install -Dm644 "./nenya.socket" "${pkgdir}/usr/lib/systemd/system/nenya.socket"
      install -Dm644 "./example.config.json" "${pkgdir}/etc/nenya/config.json.example"

nix:
  - name: nenya
    description: Nenya is a lightweight, highly secure AI API Gateway/Proxy written in Go.
    homepage: https://github.com/gumieri/nenya
    license: mit
    repository:
      owner: gumieri
      name: nur-packages
      branch: main
    extra_install: |
      install -Dm644 ./nenya.service $out/lib/systemd/system/nenya.service
      install -Dm644 ./nenya.socket $out/lib/systemd/system/nenya.socket
      install -Dm644 ./example.config.json $out/etc/nenya/config.json.example

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^Merge pull request"
      - "^Merge branch"
      - "^refactor:"

checksum:
  name_template: "checksums.txt"

signs:
  - id: checksums
    artifacts: checksum
    args: ["sign", "-y", "{{ .Artifact }}"]
    cmd: cosign

release:
  github:
    owner: gumieri
    name: nenya
  mode: replace
  name_template: "Nenya {{ .Version }}"
  draft: false
  prerelease: auto
